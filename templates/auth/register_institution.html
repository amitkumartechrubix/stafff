<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Institution · Hustl</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="/static/css/style.css" rel="stylesheet" />
</head>
<body class="si-auth-page">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="text-center mb-4">
        <i class="fas fa-hard-hat fa-3x text-warning"></i>
        <h3 class="mt-2 fw-bold">Register Your Institution</h3>
        <p class="text-muted">Partner with Hustl to place your students in blue-collar roles.</p>
      </div>

      {% for msg in flash_messages %}
      <div class="alert alert-{{ 'danger' if msg.category == 'error' else msg.category }} alert-dismissible fade show">
        {{ msg.message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <form method="POST" action="/register/institution" novalidate>

            <!-- Institution Details -->
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">
              <i class="fas fa-university me-2"></i>Institution Details
            </h6>
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Institution Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" placeholder="Government ITI Mumbai" required />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Institution Type</label>
                <select name="institution_type" class="form-select">
                  <option value="">— Select Type —</option>
                  <option>ITI (Industrial Training Institute)</option>
                  <option>Polytechnic College</option>
                  <option>Engineering College</option>
                  <option>Vocational Training Centre</option>
                  <option>Government College</option>
                  <option>Private College</option>
                  <option>Skill Development Centre</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Address</label>
                <textarea name="address" class="form-control" rows="2" placeholder="Full address…"></textarea>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">City</label>
                <select name="city" class="form-select js-city-select" id="registerInstitutionCity"
                        data-state-target="registerInstitutionState"></select>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">State</label>
                <select name="state" class="form-select js-state-select" id="registerInstitutionState"></select>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">PIN Code</label>
                <input type="text" name="pincode" class="form-control" placeholder="411001" maxlength="6" />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Affiliation / Board</label>
                <input type="text" name="affiliation" class="form-control" placeholder="NCVT / State Board" />
              </div>
              <div class="col-md-3">
                <label class="form-label fw-semibold">Years of Operation</label>
                <input type="number" name="years_of_operation" class="form-control" placeholder="15" min="0" />
              </div>
              <div class="col-md-3">
                <label class="form-label fw-semibold">Student Strength</label>
                <input type="number" name="student_strength" class="form-control" placeholder="500" min="0" />
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Courses Offered</label>
                <textarea name="courses_offered" class="form-control" rows="3"
                          placeholder="e.g. Electrician, Fitter, Welder, Plumber, Carpenter, COPA…"></textarea>
                <div class="form-text">List each course on a new line or separate by commas.</div>
              </div>
            </div>

            <!-- Point of Contact -->
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">
              <i class="fas fa-id-badge me-2"></i>Point of Contact
            </h6>
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Name</label>
                <input type="text" name="poc_name" class="form-control" placeholder="Dr. Ramesh Kumar" />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Designation</label>
                <input type="text" name="poc_designation" class="form-control" placeholder="Principal / Placement Officer" />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="poc_email" class="form-control" placeholder="placement@iti.edu.in" />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Phone</label>
                <input type="tel" name="poc_phone" class="form-control" placeholder="+91 98765 43210" />
              </div>
            </div>

            <div class="d-flex gap-3">
              <button type="submit" class="btn btn-warning fw-bold px-4">
                <i class="fas fa-paper-plane me-2"></i>Submit Registration
              </button>
              <a href="/login" class="btn btn-outline-secondary px-4">
                <i class="fas fa-arrow-left me-2"></i>Back to Login
              </a>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
