<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Company · Hustl</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="/static/css/style.css" rel="stylesheet" />
</head>
<body class="si-auth-page">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="text-center mb-4">
        <i class="fas fa-hard-hat fa-3x text-warning"></i>
        <h3 class="mt-2 fw-bold">Register Your Company</h3>
        <p class="text-muted">Fill in the details below. Our team will verify and activate your account.</p>
      </div>

      {% for msg in flash_messages %}
      <div class="alert alert-{{ 'danger' if msg.category == 'error' else msg.category }} alert-dismissible fade show">
        {{ msg.message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <form method="POST" action="/register/company" novalidate>

            <!-- Company Information -->
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">
              <i class="fas fa-building me-2"></i>Company Information
            </h6>
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Company Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" placeholder="Acme Construction Ltd." required />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Industry</label>
                <select name="industry" class="form-select">
                  <option value="">— Select Industry —</option>
                  <option>Construction</option>
                  <option>Manufacturing</option>
                  <option>Logistics & Warehousing</option>
                  <option>Agriculture</option>
                  <option>Textile</option>
                  <option>Mining</option>
                  <option>Hospitality</option>
                  <option>Security Services</option>
                  <option>Facility Management</option>
                  <option>Healthcare Support</option>
                  <option>Retail</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Address</label>
                <textarea name="address" class="form-control" rows="2" placeholder="Full address…"></textarea>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">City</label>
                <select name="city" class="form-select js-city-select" id="registerCompanyCity"
                        data-state-target="registerCompanyState"></select>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">State</label>
                <select name="state" class="form-select js-state-select" id="registerCompanyState"></select>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">PIN Code</label>
                <input type="text" name="pincode" class="form-control" placeholder="400001" maxlength="6" />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Website</label>
                <input type="url" name="website" class="form-control" placeholder="https://example.com" />
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">About the Company</label>
                <textarea name="description" class="form-control" rows="3"
                          placeholder="Brief description of your company…"></textarea>
              </div>
            </div>

            <!-- Technical Contact -->
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">
              <i class="fas fa-laptop-code me-2"></i>Technical Contact
            </h6>
            <div class="row g-3 mb-4">
              <div class="col-md-4">
                <label class="form-label fw-semibold">Name</label>
                <input type="text" name="technical_contact_name" class="form-control" placeholder="John Doe" />
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="technical_contact_email" class="form-control" placeholder="tech@company.com" />
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Phone</label>
                <input type="tel" name="technical_contact_phone" class="form-control" placeholder="+91 98765 43210" />
              </div>
            </div>

            <!-- HR Contact -->
            <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">
              <i class="fas fa-user-tie me-2"></i>HR Contact
            </h6>
            <div class="row g-3 mb-4">
              <div class="col-md-4">
                <label class="form-label fw-semibold">Name</label>
                <input type="text" name="hr_contact_name" class="form-control" placeholder="Jane Smith" />
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="hr_contact_email" class="form-control" placeholder="hr@company.com" />
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Phone</label>
                <input type="tel" name="hr_contact_phone" class="form-control" placeholder="+91 98765 43210" />
              </div>
            </div>

            <div class="d-flex gap-3">
              <button type="submit" class="btn btn-warning fw-bold px-4">
                <i class="fas fa-paper-plane me-2"></i>Submit Registration
              </button>
              <a href="/login" class="btn btn-outline-secondary px-4">
                <i class="fas fa-arrow-left me-2"></i>Back to Login
              </a>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
